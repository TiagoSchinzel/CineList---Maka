<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineList - Para Minha Amiga</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importando fonte arredondada do Google Fonts -->
<link href="https://fonts.googleapis.com" rel="stylesheet">

</head>
<body>
    <header>
        <h1>🎬 CineList</h1>
        <div class="search-container">
            <input type="text" placeholder="Pesquisar filme ou série...">
            <button>Adicionar</button>
        </div>
    </header>

    <main>

<section id="schedule">
    <h2>📅 Meu Cronograma</h2>
    <div class="grid-container" id="upcoming-list">
        
        <!-- ADICIONE O EXEMPLO AQUI (DENTRO DA DIV 'upcoming-list') -->
        <div class="movie-card">
            <img src="https://image.tmdb.org" alt="Poster">
            <div class="movie-info">
                <h4>Moana 2</h4>
                <p>Lança em: 27/11/2024</p>
                <!-- No seu index.html, dentro da lista de cronograma -->
<a id="link-agenda" class="btn-calendar" href="#" onclick="prepararLink(event, 'Moana 2', '20241127')">
    🐾 Salvar na Agenda
</a>
            </div>
        </div>
        <!-- FIM DO EXEMPLO -->

    </div>
</section>

        <!-- Listas de Status -->
        <section id="my-lists">
            <div class="list-column">
                <h2>⏳ Quero Assistir</h2>
                <div class="card-list" id="watchlist"></div>
            </div>

            <div class="list-column">
                <h2>✅ Já Assistidos</h2>
                <div class="card-list" id="watched"></div>
            </div>
        </section>
    </main>
        <script src="script.js"></script>
</body>
</html>
